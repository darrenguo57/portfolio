<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业网站开发服务 - 快速交付</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Hero */
        .hero { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 100px 0; text-align: center;
        }
        .hero h1 { font-size: 3rem; margin-bottom: 20px; }
        .hero p { font-size: 1.3rem; opacity: 0.9; max-width: 600px; margin: 0 auto 30px; }
        .btn { 
            display: inline-block; padding: 15px 40px; background: white; color: #667eea;
            text-decoration: none; border-radius: 50px; font-weight: bold; transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        
        /* Services */
        .services { padding: 80px 0; background: #f8f9fa; }
        .services h2 { text-align: center; font-size: 2.5rem; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { 
            background: white; padding: 40px 30px; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .card h3 { font-size: 1.5rem; margin-bottom: 15px; color: #667eea; }
        .card .price { font-size: 2rem; color: #764ba2; font-weight: bold; margin: 20px 0; }
        .card .note { color: #666; font-size: 0.9rem; }
        
        /* Contact */
        .contact { padding: 80px 0; text-align: center; }
        .contact h2 { font-size: 2.5rem; margin-bottom: 30px; }
        .contact-form { max-width: 500px; margin: 0 auto; }
        .contact-form input, .contact-form textarea { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; font-size: 1rem;
        }
        .contact-form textarea { height: 120px; resize: none; }
        .submit-btn { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
        }
        
        /* Footer */
        footer { background: #333; color: white; padding: 40px 0; text-align: center; }
        footer p { opacity: 0.7; }
    </style>
</head>
<body>

<section class="hero">
    <div class="container">
        <h1>专业网站开发服务</h1>
        <p>企业官网 | 小程序 | 电商系统<br>7-15天交付，无忧售后</p>
        <a href="#contact" class="btn">立即咨询</a>
    </div>
</section>

<section class="services">
    <div class="container">
        <h2>我们的服务</h2>
        <div class="grid">
            <div class="card">
                <h3>企业官网</h3>
                <div class="price">¥5,000起</div>
                <p class="note">响应式设计 SEO优化<br>7-15天交付</p>
            </div>
            <div class="card">
                <h3>小程序开发</h3>
                <div class="price">¥3,000起</div>
                <p class="note">展示/电商/预约<br>15-30天交付</p>
            </div>
            <div class="card">
                <h3>营销落地页</h3>
                <div class="price">¥2,000起</div>
                <p class="note">高转化页面<br>3-7天交付</p>
            </div>
        </div>
    </div>
</section>

<section class="contact" id="contact">
    <div class="container">
        <h2>开始您的项目</h2>
        <form class="contact-form" onsubmit="event.preventDefault(); alert('感谢咨询！请加群或直接联系。');">
            <input type="text" placeholder="您的名字" required>
            <input type="tel" placeholder="联系电话" required>
            <textarea placeholder="简单描述您的需求..." required></textarea>
            <button type="submit" class="submit-btn">发送咨询</button>
        </form>
    </div>
</section>

<footer>
    <div class="container">
        <p>飞书群：oc_ce5721bc5b0ba2d7d10e4fc1e90f104b</p>
        <p style="margin-top:10px; opacity: 0.5;">© 2026 专业网站开发服务</p>
    </div>
</footer>

</body>
</html>
